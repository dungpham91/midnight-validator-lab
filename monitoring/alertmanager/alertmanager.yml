# Alertmanager routing → Slack.
#
# Each Slack channel needs its OWN webhook (a webhook is bound to one channel). No URL is
# stored here — each receiver reads its webhook from a mounted secret file (`api_url_file`):
#   secrets/slack_alerts    -> #midnight-alerts   (warnings)
#   secrets/slack_critical  -> #midnight-critical (critical)
# Source of truth = one AWS Secrets Manager secret (JSON {alerts, critical}); materialise both:
#   S=$(aws secretsmanager get-secret-value --secret-id <name>/slack-webhooks --query SecretString --output text)
#   jq -rn --argjson s "$S" '$s.alerts'   | install -m600 /dev/stdin secrets/slack_alerts
#   jq -rn --argjson s "$S" '$s.critical' | install -m600 /dev/stdin secrets/slack_critical
# Standalone (no SM): cp each .example to its real name and paste the matching webhook.
# See monitoring/README.md ▸ "Wire the webhooks".
#
# Critical alerts go to #midnight-critical with a short group_wait so they surface fast;
# warnings are batched into #midnight-alerts to reduce noise.

global:
  resolve_timeout: 5m

route:
  receiver: slack-warnings
  group_by: ['alertname', 'instance']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers: ['severity="critical"']
      receiver: slack-critical
      group_wait: 10s
      repeat_interval: 1h
    - matchers: ['severity="warning"']
      receiver: slack-warnings

receivers:
  - name: slack-warnings
    slack_configs:
      - api_url_file: /etc/alertmanager/secrets/slack_alerts
        channel: '#midnight-alerts'
        send_resolved: true
        color: '{{ if eq .Status "firing" }}warning{{ else }}good{{ end }}'
        title: '[{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}'
        text: |-
          {{ range .Alerts -}}
          *Severity:* {{ .Labels.severity }}  |  *Instance:* {{ .Labels.instance }}
          *Summary:* {{ .Annotations.summary }}
          *Detail:* {{ .Annotations.description }}
          {{ if .Annotations.runbook }}*Runbook:* {{ .Annotations.runbook }}{{ end }}
          {{ end }}

  - name: slack-critical
    slack_configs:
      - api_url_file: /etc/alertmanager/secrets/slack_critical
        channel: '#midnight-critical'
        send_resolved: true
        color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'
        title: ':rotating_light: [{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        text: |-
          {{ range .Alerts -}}
          *Severity:* {{ .Labels.severity }}  |  *Instance:* {{ .Labels.instance }}
          *Summary:* {{ .Annotations.summary }}
          *Detail:* {{ .Annotations.description }}
          {{ if .Annotations.runbook }}*Runbook:* {{ .Annotations.runbook }}{{ end }}
          {{ end }}

inhibit_rules:
  # If the node is DOWN, suppress the noisier stalled/no-peers alerts for the same host.
  - source_matchers: ['alertname="MidnightNodeDown"']
    target_matchers: ['severity=~"warning|critical"']
    equal: ['instance']
